<mat-form-field appearance="outline" class="house-field">
  <mat-label>Filter by house</mat-label>
  <mat-select
    [(ngModel)]="selectedHouse"
    (ngModelChange)="onSelectionChange($event)"
    aria-label="Filter characters by house"
  >
    @for (house of houses; track house) {
      <mat-option [value]="house">{{ house }}</mat-option>
    }
  </mat-select>
</mat-form-field>
